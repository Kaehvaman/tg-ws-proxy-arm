name: Build & Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create Github Release?'
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv \
            python3-dev \
            python3-gi \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-tk

      - name: Create venv with system site-packages
        run: python3 -m venv --system-site-packages .venv

      - name: Install dependencies
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install .
          .venv/bin/pip install "pyinstaller==6.13.0"

      - name: Build binary with PyInstaller
        run: .venv/bin/pyinstaller packaging/linux.spec --noconfirm

      - name: Rename binary artifact
        run: mv dist/TgWsProxy dist/TgWsProxy_linux_arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy-linux
          path: |
            dist/TgWsProxy_linux_amd64

  release:
    needs: [build-linux]
    runs-on: ubuntu-22.04-arm
    if: ${{ github.event.inputs.make_release == 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: TgWsProxy*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## TG WS Proxy ${{ github.event.inputs.version }}
          files: |
            dist/TgWsProxy_linux_arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
